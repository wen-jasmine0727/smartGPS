# 智慧物流 IoT 平台 · 基础设施
# 启动：docker-compose up -d
# 停止：docker-compose down

services:

  # PostgreSQL + TimescaleDB + pgvector
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: logistics-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: smart_logistics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sky-take-out/sky-server/src/main/resources/sql/backend1_business_init.sql:/docker-entrypoint-initdb.d/01_backend1.sql
      - ./sky-take-out/sky-server/src/main/resources/sql/backend3_init.sql:/docker-entrypoint-initdb.d/02_backend3.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_logistics"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - logistics-network

  # TimescaleDB 时序库，存储 GPS 轨迹点和设备心跳
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: logistics-timescaledb
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: gps
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./sky-take-out/sky-server/src/main/resources/sql/backend2_timescaledb_init.sql:/docker-entrypoint-initdb.d/01_backend2_timescaledb.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gps"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: logistics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - logistics-network

  # Kafka 消息队列，接收 MQTT 转发后的 GPS 和心跳消息
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: logistics-kafka
    hostname: kafka
    ports:
      - "9092:9092"     # Spring Boot 本地连接端口
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 初始化后端 2 会用到的 Kafka Topic
  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: logistics-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic gps-points --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic vehicle-heartbeats --partitions 3 --replication-factor 1

  # EMQX MQTT Broker
  emqx:
    image: emqx/emqx:latest
    container_name: logistics-emqx
    ports:
      - "1883:1883"     # MQTT 协议端口
      - "18083:18083"   # Dashboard 管理页面
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
    volumes:
      - emqx-data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - logistics-network

  # Kafka 消息队列 (KRaft 模式，无需 Zookeeper)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logistics-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft 模式
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 监听器
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # 自动创建 topic（开发便利）
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - logistics-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: logistics-minio
    ports:
      - "9000:9000"     # API 端口
      - "9001:9001"     # Console 管理页面
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - logistics-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: logistics-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - logistics-network

# 数据卷
volumes:
  postgres-data:
  timescaledb-data:
  redis-data:
  kafka-data:
  emqx-data:
  kafka-data:
  minio-data:

# 内部网络
networks:
  logistics-network:
    driver: bridge
