spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:logistics}
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    druid:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:logistics}
      username: ${POSTGRES_USERNAME:postgres}
      password: ${DB_PASSWORD:123456}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:logistics-consumer-group}
      auto-offset-reset: earliest

sky:
  datasource:
    driver-class-name: org.postgresql.Driver
    host: ${POSTGRES_HOST:localhost}
    port: ${POSTGRES_PORT:5432}
    database: ${POSTGRES_DATABASE:logistics}
    username: ${POSTGRES_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
  alioss:
    endpoint: ${ALIOSS_ENDPOINT:local}
    access-key-id: ${ALIOSS_ACCESS_KEY_ID:local}
    access-key-secret: ${ALIOSS_ACCESS_KEY_SECRET:local}
    bucket-name: ${ALIOSS_BUCKET_NAME:local}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
  wechat:
    appid: ${WECHAT_APPID:local}
    secret: ${WECHAT_SECRET:local}
    mchid: ${WECHAT_MCHID:local}
    mchSerialNo: ${WECHAT_MCH_SERIAL_NO:local}
    privateKeyFilePath: ${WECHAT_PRIVATE_KEY_FILE_PATH:local}
    apiV3Key: ${WECHAT_API_V3_KEY:local}
    weChatPayCertFilePath: ${WECHAT_PAY_CERT_FILE_PATH:local}
    notifyUrl: ${WECHAT_NOTIFY_URL:local}
    refundNotifyUrl: ${WECHAT_REFUND_NOTIFY_URL:local}

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ${MQTT_CLIENT_ID:backend-realtime-service-01}
  username: ${MQTT_USERNAME:}
  password: ${MQTT_PASSWORD:}

# TimescaleDB 时序库（第二数据源），存储 gps_points 和 device_heartbeats
timescaledb:
  datasource:
    jdbc-url: jdbc:postgresql://${TIMESCALEDB_HOST:localhost}:${TIMESCALEDB_PORT:5433}/${TIMESCALEDB_DATABASE:gps}
    username: ${TIMESCALEDB_USERNAME:postgres}
    password: ${TIMESCALEDB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com:
      sky:
        logistics: debug
